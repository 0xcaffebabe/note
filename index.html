<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F1F5F9">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1e1e1e">
    <title>知识体系</title>
    <style>
      #buildTime {
        color: black;
        font-weight: 600;
        font-size: 12px;
        opacity: 0.4;
        pointer-events: none;
      }
      body[theme=dark] #buildTime {
        color: white;
      }

      /* ---- 首屏启动骨架: 仅在JS执行前可见 Vue挂载后被替换 ---- */
      .boot-skeleton {
        min-height: 100vh;
        background: #F1F5F9;
      }
      .bs-header {
        height: 60px;
        background: #ffffff;
        border-bottom: 1px solid #e2e8f0;
      }
      .bs-body {
        display: flex;
        gap: 24px;
        padding: 16px;
      }
      .bs-aside {
        width: 280px;
        height: 70vh;
        flex-shrink: 0;
        border-radius: 8px;
        background: #ffffff;
      }
      .bs-main {
        flex: 1;
        max-width: 820px;
        padding-top: 24px;
      }
      .bs-line {
        height: 14px;
        border-radius: 4px;
        background: rgba(100, 116, 139, 0.12);
        margin-bottom: 14px;
      }
      .bs-line.w40 { width: 40%; height: 24px; margin-bottom: 24px; }
      .bs-line.w90 { width: 90%; }
      .bs-line.w75 { width: 75%; }
      .bs-line.w60 { width: 60%; }
      html.dark .boot-skeleton { background: #1e1e1e; }
      html.dark .bs-header { background: #252526; border-bottom-color: #454545; }
      html.dark .bs-aside { background: #252526; }
      html.dark .bs-line { background: rgba(255, 255, 255, 0.08); }
      @media (max-width: 960px) {
        .bs-aside { display: none; }
      }
      /* 文档静态页自带可见正文 无需骨架 */
      body:has(.static-content) .boot-skeleton { display: none; }

      /* ---- 文档静态正文: JS执行前直接可读 Vue挂载后由main.ts移除 ---- */
      .static-content {
        max-width: 820px;
        margin: 0 auto;
        padding: 24px 20px 60px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        font-size: 16px;
        line-height: 1.8;
        color: #1e293b;
      }
      .static-content pre {
        overflow-x: auto;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        padding: 12px;
        font-size: 14px;
      }
      .static-content img { max-width: 100%; height: auto; }
      .static-content table { border-collapse: collapse; width: 100%; }
      .static-content th, .static-content td { border: 1px solid #e2e8f0; padding: 8px 12px; }
      .static-content a { color: #409eff; }
      .static-content blockquote { border-left: 4px solid #409eff; margin: 16px 0; padding: 4px 16px; color: #64748b; }
      html.dark .static-content { color: #e0e0e0; }
      html.dark .static-content pre { background: #252526; border-color: #454545; }
      html.dark .static-content th, html.dark .static-content td { border-color: #454545; }
      html.dark .static-content blockquote { color: #a0a0a0; }
    </style>
  </head>
  <body>
    <script>
      // 首屏主题预设: 在首帧渲染前同步应用主题 消除暗色用户的白屏闪烁
      (function () {
        try {
          var stored = localStorage.getItem('system::theme')
          var dark = stored ? stored === 'dark' : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) {
            document.documentElement.classList.add('dark')
            document.body.setAttribute('theme', 'dark')
            document.documentElement.style.backgroundColor = '#1e1e1e'
          } else {
            document.documentElement.style.backgroundColor = '#F1F5F9'
          }
        } catch (e) { /* localStorage 不可用时保持默认浅色 */ }
      })()
    </script>
    <header id="staticHeader" style="display: none;">
      {summary}
    </header>
    <div id="app">
      <div class="boot-skeleton">
        <div class="bs-header"></div>
        <div class="bs-body">
          <div class="bs-aside"></div>
          <div class="bs-main">
            <div class="bs-line w40"></div>
            <div class="bs-line w90"></div>
            <div class="bs-line w75"></div>
            <div class="bs-line w90"></div>
            <div class="bs-line w60"></div>
            <div class="bs-line w75"></div>
          </div>
        </div>
      </div>
    </div>
    <div style="position: fixed; bottom: 10px; right: 10px" id="buildTime"></div>
    <script type="module" src="/src/platform/web/main.ts"></script>
  </body>
  <script>
    /*build-time*/const buildTime = "" /*build-time*/
    if (buildTime) {
      document.getElementById("buildTime").innerHTML = `${new Date(buildTime).toLocaleString()}`
    }
  </script>
</html>
